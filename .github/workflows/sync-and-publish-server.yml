name: "Sync upstream and publish (server)"

on:
  schedule:
    - cron: "0 5 15 * *"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  sync-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ente-io/ente.git
          git fetch upstream main

      - name: Merge upstream excluding .github
        run: |
          git merge upstream/main --no-edit --no-commit || true
          git checkout HEAD -- .github/
          git commit -m "chore: sync upstream main" --allow-empty

      - name: Push
        run: git push origin main

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          dockerfile: server/Dockerfile
          directory: server
          image: ente/server
          registry: ghcr.io
          enableBuildKit: true
          multiPlatform: true
          # platform: linux/amd64,linux/arm64
          platform: linux/amd64
          buildArgs: GIT_COMMIT=${{ steps.sha.outputs.sha }}
          tags: ${{ steps.sha.outputs.sha }}, latest
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
