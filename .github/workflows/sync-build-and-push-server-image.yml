# Based on server-publish-ghcr.yml
name: "Sync, build and publish (server)"

on:
  # Run automatically on 15th of every month, at 05:00 UTC.
  schedule:
    - cron: "0 5 15 * *"
  # Run manually if needed to publish out of schedule.
  workflow_dispatch:

permissions:
  contents: write # for pushing the `ghcr/server` branch
  packages: write
  workflows: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v6
        with:
          ref: feat/register-allow-list
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Rebase onto upstream main
        run: |
          git remote add upstream https://github.com/ente-io/ente.git
          git fetch upstream main
          git rebase upstream/main
          git push --force-with-lease origin feat/register-allow-list

      - name: Get commit SHA
        id: sha
        run: echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: mr-smithers-excellent/docker-build-push@v6
        with:
          dockerfile: server/Dockerfile
          directory: server
          image: server
          registry: ghcr.io
          enableBuildKit: true
          multiPlatform: true
          platform: linux/amd64,linux/arm64
          buildArgs: GIT_COMMIT=${{ steps.sha.outputs.sha }}
          tags: ${{ steps.sha.outputs.sha }}, latest
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
