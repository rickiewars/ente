name: "Sync upstream (server)"

on:
  schedule:
    - cron: "0 5 15 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ente-io/ente.git
          git fetch upstream main

      - name: Merge upstream excluding .github
        run: |
          git merge upstream/main --no-edit --no-commit || true
          git checkout HEAD -- .github/
          git commit -m "chore: sync upstream main" --allow-empty

      - name: Push
        run: git push origin main

      - name: Trigger publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run publish-server.yml --ref main
