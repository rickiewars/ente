name: "Sync upstream (server)"

on:
  schedule:
    - cron: "0 5 15 * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: feat/register-allow-list
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ente-io/ente.git
          git fetch upstream main

      - name: Merge upstream excluding .github
        run: |
          git merge upstream/main --no-edit --no-commit || true
          git checkout HEAD -- .github/
          git commit -m "chore: sync upstream main" --allow-empty

      - name: Push or create PR on conflict
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git push origin feat/register-allow-list; then
            echo "Pushed successfully, no PR needed"
          else
            git merge --abort
            git fetch origin feat/register-allow-list
            git checkout feat/register-allow-list
            PR_URL=$(gh pr create \
              --title "chore: sync upstream main" \
              --body "Automated upstream sync — conflicts need manual resolution" \
              --base feat/register-allow-list \
              --head upstream/main)
            gh pr merge "$PR_URL" --auto --merge
          fi
